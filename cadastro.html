<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta | PedeMeia</title>
  <style>
    :root {
      color-scheme: light;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --border: #d6d3cc;
      --error: #b91c1c;
      --success: #047857;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f3efe6 0%, #ecfeff 100%);
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(100%, 460px);
      background: var(--card);
      border: 1px solid rgba(17, 24, 39, 0.08);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
    }

    h1 { margin: 0 0 8px; font-size: 2rem; }
    p { margin: 0 0 24px; color: var(--muted); line-height: 1.5; }

    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
      margin: 16px 0 8px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
    }

    button {
      width: 100%;
      margin-top: 24px;
      border: 0;
      border-radius: 12px;
      padding: 14px 16px;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--primary-hover); }
    button:disabled { opacity: 0.7; cursor: not-allowed; }

    .message {
      min-height: 1.25rem;
      margin-top: 16px;
      font-size: 0.95rem;
    }

    .message.error { color: var(--error); }
    .message.success { color: var(--success); }

    .links {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 0.95rem;
    }

    .links a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .links a:hover { text-decoration: underline; }

    .successBox {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(4, 120, 87, 0.08);
      border: 1px solid rgba(4, 120, 87, 0.18);
    }

    .successBox strong {
      display: block;
      margin-bottom: 6px;
    }

    .successBox a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .successBox a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Criar conta</h1>
    <p>Preencha os dados abaixo para registrar seu acesso.</p>

    <form id="signupForm">
      <label for="nome">Nome</label>
      <input id="nome" name="nome" type="text" autocomplete="name" required>

      <label for="email">E-mail</label>
      <input id="email" name="email" type="email" autocomplete="email" required>

      <label for="senha">Senha</label>
      <input id="senha" name="senha" type="password" minlength="6" autocomplete="new-password" required>

      <button id="submitButton" type="submit">Criar conta</button>
      <div id="message" class="message" aria-live="polite"></div>
    </form>

    <div class="links">
      <span>Já tem conta?</span>
      <a href="login.html">Entrar</a>
    </div>

    <div class="successBox">
      <strong>Depois de criar a conta</strong>
      <span>Você vai voltar para a tela de login para entrar com o novo e-mail e senha.</span>
    </div>
  </main>

  <script>
    const form = document.getElementById('signupForm');
    const nomeInput = document.getElementById('nome');
    const emailInput = document.getElementById('email');
    const senhaInput = document.getElementById('senha');
    const message = document.getElementById('message');
    const submitButton = document.getElementById('submitButton');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';
      message.className = 'message';
      submitButton.disabled = true;
      submitButton.textContent = 'Criando...';

      try {
        const response = await fetch('/cadastro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nome: nomeInput.value.trim(),
            email: emailInput.value.trim(),
            senha: senhaInput.value,
          }),
        });

        const raw = await response.text();
        const data = raw ? JSON.parse(raw) : {};

        if (!response.ok) {
          throw new Error(data.erro || 'Não foi possível criar a conta.');
        }

        message.textContent = data.mensagem || 'Conta criada com sucesso.';
        message.classList.add('success');
        form.reset();
        window.setTimeout(() => {
          window.location.href = 'login.html?cadastro=ok';
        }, 900);
      } catch (error) {
        message.textContent = error.message;
        message.classList.add('error');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Criar conta';
      }
    });

    if (new URLSearchParams(window.location.search).get('cadastro') === 'ok') {
      message.textContent = 'Conta criada. Agora faça login.';
      message.classList.add('success');
    }
  </script>
</body>
</html>

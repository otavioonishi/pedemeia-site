<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | PedeMeia</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --border: #d6d3cc;
      --error: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f3efe6 0%, #eef2ff 100%);
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(100%, 420px);
      background: var(--card);
      border: 1px solid rgba(17, 24, 39, 0.08);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
      margin: 16px 0 8px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
    }

    button {
      width: 100%;
      margin-top: 24px;
      border: 0;
      border-radius: 12px;
      padding: 14px 16px;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--primary-hover); }
    button:disabled { opacity: 0.7; cursor: not-allowed; }

    .message {
      min-height: 1.25rem;
      margin-top: 16px;
      font-size: 0.95rem;
    }

    .message.error { color: var(--error); }
    .message.success { color: var(--primary); }

    .links {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 0.95rem;
    }

    .links a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .links a:hover { text-decoration: underline; }

    .signupBox {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(15, 118, 110, 0.08);
      border: 1px solid rgba(15, 118, 110, 0.18);
    }

    .signupBox strong {
      display: block;
      margin-bottom: 6px;
    }

    .signupBox a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .signupBox a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Entrar</h1>
    <p>Acesse sua conta para continuar no PedeMeia.</p>

    <form id="loginForm">
      <label for="email">E-mail</label>
      <input id="email" name="email" type="email" autocomplete="email" required>

      <label for="senha">Senha</label>
      <input id="senha" name="senha" type="password" autocomplete="current-password" required>

      <button id="submitButton" type="submit">Entrar</button>
      <div id="message" class="message" aria-live="polite"></div>
    </form>

    <div class="links">
      <span>Não tem conta?</span>
      <a href="cadastro.html">Criar cadastro</a>
    </div>

    <div class="signupBox">
      <strong>Conta nova?</strong>
      <span>Se aparecer “e-mail ou senha incorretos”, crie seu acesso em alguns segundos.</span>
      <div style="margin-top: 8px;">
        <a href="cadastro.html">Criar conta nova</a>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const senhaInput = document.getElementById('senha');
    const message = document.getElementById('message');
    const submitButton = document.getElementById('submitButton');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';
      message.className = 'message';
      submitButton.disabled = true;
      submitButton.textContent = 'Entrando...';

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: emailInput.value.trim(),
            senha: senhaInput.value,
          }),
        });

        const raw = await response.text();
        const data = raw ? JSON.parse(raw) : {};

        if (!response.ok) {
          throw new Error(data.erro || 'E-mail ou senha incorretos. Crie uma conta nova se ainda não tiver acesso.');
        }

        sessionStorage.setItem('usuario', JSON.stringify(data.usuario));
        message.textContent = 'Login realizado com sucesso.';
        message.classList.add('success');
        window.location.href = 'dashboard.html';
      } catch (error) {
        message.textContent = error.message;
        message.classList.add('error');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>

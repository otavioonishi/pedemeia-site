
fetch('/login', {
  method: 'POST',
  headers: {'Content-Type':'application/json'},
  body: JSON.stringify({email, senha})
})
.then(res => res.json())
.then(data => {
  if(data.usuario){
    sessionStorage.setItem('usuario', JSON.stringify(data.usuario));
    window.location.href = 'dashboard.html';
  }
});
